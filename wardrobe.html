<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>My Wardrobe</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f0f0;
    height: 100dvh;
    overflow: hidden;
  }

  /* ── HEADER ── */
  .header {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 50;
    padding: 10px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid #e5e5ea;
  }

  .scenario-pill {
    flex: 1;
    padding: 7px 4px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    border: none;
    background: #f2f2f7;
    color: #8e8e93;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .scenario-pill.active {
    background: #1c1c1e;
    color: #fff;
  }

  /* ── OUTFIT PREVIEW ── */
  .preview-area {
    position: absolute;
    top: 50px; left: 0; right: 0;
    bottom: 290px;
    background: #fff;
    padding: 12px;
  }

  /* 2-column x 4-row grid */
  .outfit-canvas {
    width: 100%;
    height: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr 1fr 1fr;
    gap: 8px;
  }

  /* Slot base */
  .outfit-slot {
    border-radius: 12px;
    background: #f2f2f7;
    border: 2px dashed #d1d1d6;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    transition: all 0.3s ease;
    min-height: 0;
  }
  .outfit-slot.filled {
    border: 2px solid #e5e5ea;
    background: #fff;
  }
  .outfit-slot img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  .outfit-slot .empty-label {
    font-size: 11px;
    color: #c7c7cc;
    text-align: center;
  }
  .outfit-slot .slot-name {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.45);
    color: white;
    font-size: 9px;
    padding: 3px 6px;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .outfit-slot .remove-btn {
    position: absolute;
    top: 4px; right: 4px;
    width: 22px; height: 22px;
    background: rgba(0,0,0,0.5);
    color: white;
    border: none;
    border-radius: 50%;
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Grid placement — BLAZER mode */
  #slot-outer  { grid-column: 1; grid-row: 1 / 3; }
  #slot-top    { grid-column: 2; grid-row: 1 / 3; }
  #slot-pants  { grid-column: 1; grid-row: 3 / 5; }
  #slot-belts  { grid-column: 2; grid-row: 3; }
  #slot-shoes  { grid-column: 2; grid-row: 4; }

  /* SUIT mode — outer spans full height */
  .suit-mode #slot-outer { grid-row: 1 / 5; }
  .suit-mode #slot-pants { display: none; }

  /* ── BOTTOM PANEL ── */
  .bottom-panel {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 290px;
    background: #f2f2f7;
    border-top: 1px solid #e5e5ea;
    display: flex;
    flex-direction: column;
    z-index: 40;
  }


  /* Sub-sub-category tabs */
  .subsub-tabs {
    display: flex;
    gap: 6px;
    padding: 3px 16px 4px;
    overflow-x: auto;
    flex-shrink: 0;
    min-height: 28px;
  }
  .subsub-tabs::-webkit-scrollbar { display: none; }
  .subsub-tab {
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 500;
    border: 1.5px solid #e5e5ea;
    background: transparent;
    color: #aeaeb2;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .subsub-tab.active {
    background: #f2f2f7;
    color: #1c1c1e;
    border-color: #8e8e93;
  }

  /* Main category tabs */
  .cat-tabs {
    display: flex;
    gap: 8px;
    padding: 10px 16px 6px;
    overflow-x: auto;
    flex-shrink: 0;
  }
  .cat-tabs::-webkit-scrollbar { display: none; }
  .cat-tab {
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    border: none;
    background: #e5e5ea;
    color: #8e8e93;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .cat-tab.active {
    background: #1c1c1e;
    color: #fff;
  }

  /* Sub-category tabs */
  .sub-tabs {
    display: flex;
    gap: 6px;
    padding: 4px 16px 6px;
    overflow-x: auto;
    flex-shrink: 0;
  }
  .sub-tabs::-webkit-scrollbar { display: none; }
  .sub-tab {
    padding: 3px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    border: 1.5px solid #d1d1d6;
    background: transparent;
    color: #8e8e93;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .sub-tab.active {
    background: #fff;
    color: #1c1c1e;
    border-color: #1c1c1e;
  }

  /* Carousel */
  .carousel {
    flex: 1;
    display: flex;
    gap: 8px;
    padding: 4px 16px 12px;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    align-items: flex-start;
  }
  .carousel::-webkit-scrollbar { display: none; }

  .car-item {
    flex-shrink: 0;
    width: 115px;
    border-radius: 12px;
    background: #fff;
    border: 2px solid transparent;
    cursor: pointer;
    scroll-snap-align: start;
    transition: all 0.2s;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .car-item.selected {
    border-color: #1c1c1e;
  }
  .car-item img {
    width: 100%;
    height: 130px;
    object-fit: contain;
    background: #fff;
    padding: 4px;
  }
  .car-item .car-name {
    padding: 3px 8px 5px;
    font-size: 10px;
    font-weight: 500;
    color: #3a3a3c;
    line-height: 1.3;
    height: 28px;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  /* AI match badge */
  .car-item {
    position: relative;
  }
  .match-badge {
    position: absolute;
    top: 5px;
    right: 5px;
    width: 20px;
    height: 20px;
    background: #FFD700;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    z-index: 10;
  }

  .empty-carousel {
    color: #c7c7cc;
    font-size: 13px;
    padding: 20px;
    align-self: center;
  }

  /* Swatch items */
  .swatch-item {
    flex-shrink: 0;
    width: 80px;
    border-radius: 12px;
    background: #fff;
    border: 2px solid transparent;
    cursor: pointer;
    scroll-snap-align: start;
    transition: all 0.2s;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
  }
  .swatch-item.selected { border-color: #1c1c1e; }
  .swatch-color {
    width: 100%;
    height: 90px;
    border-radius: 10px 10px 0 0;
  }
  .swatch-name {
    padding: 4px 6px 6px;
    font-size: 9px;
    font-weight: 500;
    color: #3a3a3c;
    text-align: center;
    line-height: 1.3;
  }
</style>
</head>
<body>

<!-- HEADER — Style selector -->
<div class="header">
  <button class="scenario-pill active" onclick="setScenario(this,'formal')">Formal</button>
  <button class="scenario-pill" onclick="setScenario(this,'smart-casual')">Smart Casual</button>
  <button class="scenario-pill" onclick="setScenario(this,'casual')">Casual</button>
</div>

<!-- OUTFIT PREVIEW -->
<div class="preview-area">
  <div class="outfit-canvas" id="outfitCanvas">
    <div class="outfit-slot" id="slot-outer"><div class="empty-label">Blazer</div></div>
    <div class="outfit-slot" id="slot-top"><div class="empty-label">Shirt</div></div>
    <div class="outfit-slot" id="slot-pants"><div class="empty-label">Pants</div></div>
    <div class="outfit-slot" id="slot-belts"><div class="empty-label">Belt</div></div>
    <div class="outfit-slot" id="slot-shoes"><div class="empty-label">Shoes</div></div>
  </div>
</div>

<!-- BOTTOM PANEL -->
<div class="bottom-panel">
  <div class="cat-tabs" id="catTabs">
    <button class="cat-tab active" onclick="setCategory(this,'tops')">Tops</button>
    <button class="cat-tab" onclick="setCategory(this,'pants')">Pants</button>
    <button class="cat-tab" onclick="setCategory(this,'belts')">Belts</button>
    <button class="cat-tab" onclick="setCategory(this,'shoes')">Shoes</button>
    <button class="cat-tab" onclick="setCategory(this,'blazers')">Blazers</button>
    <button class="cat-tab" onclick="setCategory(this,'suits')">Suits</button>
    <button class="cat-tab" onclick="setCategory(this,'jackets')">Jackets</button>
  </div>
  <div class="sub-tabs" id="subTabs"></div>
  <div class="subsub-tabs" id="subsubTabs"></div>
  <div class="carousel" id="carousel"></div>
</div>

<script src="catalog.js"></script>
<script>
const VERSION = Date.now();
const CATALOG_BASE = "catalog";

// catalog, SUB_CATS, SUBSUB_CATS, SLOT_MAP, SLOT_LABELS, CAT_ORDER loaded from catalog.js

// Basic pairing rules — file key -> what pairs well with it
const PAIRINGS = {
  // Blazers -> pants
  "blazer_formal_charcoal_grey.png":            { pants: ["pants_chino_allensolly_black.png","pants_denim_levis_dark_wash.png","pants_denim_westbay_dark_indigo.png","pants_chino_allensolly_khaki.png"], shoes: ["shoes_boot_colorado_black_leather_chelsea.png","shoes_sneaker_wildrhino_brown_leather.png"] },
  "blazer_formal_mid_blue.png":                 { pants: ["pants_chino_allensolly_khaki.png","pants_chino_beige_cotton.png","pants_denim_levis_dark_wash.png","pants_denim_levis_dark_blue.png"], shoes: ["shoes_boot_colorado_black_leather_chelsea.png","shoes_sneaker_wildrhino_brown_leather.png"] },
  "blazer_formal_navy.png":                     { pants: ["pants_chino_allensolly_khaki.png","pants_chino_beige_cotton.png","pants_chino_white_cotton.png","pants_denim_levis_dark_wash.png"], shoes: ["shoes_boot_colorado_black_leather_chelsea.png","shoes_sneaker_wildrhino_brown_leather.png"] },
  "blazer_formal_dark_charcoal_burgundy_lining.png": { pants: ["pants_chino_allensolly_black.png","pants_denim_levis_dark_wash.png","pants_denim_westbay_dark_indigo.png"], shoes: ["shoes_boot_colorado_black_leather_chelsea.png"] },
  "blazer_casual_blue_wool.png":                { pants: ["pants_denim_levis_dark_wash.png","pants_denim_levis_mid_blue.png","pants_chino_allensolly_khaki.png","pants_chino_beige_cotton.png"], shoes: ["shoes_sneaker_wildrhino_brown_leather.png","shoes_sneaker_wildrhino_olive.png"] },
  "blazer_casual_beige_linen.png":              { pants: ["pants_denim_levis_dark_wash.png","pants_denim_levis_mid_blue.png","pants_chino_allensolly_dark_olive.png","pants_casual_levis_linen_olive.png"], shoes: ["shoes_sneaker_wildrhino_brown_leather.png","shoes_sneaker_wildrhino_olive.png"] },
  "blazer_casual_grey_check.png":               { pants: ["pants_denim_levis_mid_blue.png","pants_denim_levis_dark_wash.png","pants_chino_allensolly_khaki.png","pants_chino_beige_cotton.png"], shoes: ["shoes_sneaker_wildrhino_brown_leather.png","shoes_boot_colorado_black_leather_chelsea.png"] },
};

function isAIMatch(cat, itemFile) {
  // Check if any selected item has a pairing rule that includes this item
  for (const [slotKey, selItem] of Object.entries(selected)) {
    const rules = PAIRINGS[selItem.file];
    if (rules && rules[cat] && rules[cat].includes(itemFile)) return true;
  }
  return false;
}

// State
let selected = {};
let currentCat = 'tops';
let currentSub = 'All';
let currentSubSub = 'All';
let currentScenario = 'office';

// Hint messages per scenario + what's been selected
const HINTS = {
  office: {
    none:    "For <strong>Office</strong> — start by picking a blazer or suit",
    outer:   "Great start! Now pick a <strong>shirt</strong> to go with it",
    top:     "Looking sharp! Now choose your <strong>pants</strong>",
    pants:   "Almost there — pick a <strong>belt</strong> and <strong>shoes</strong> to finish",
    done:    "Outfit complete! Looking office-ready 💼",
  },
  casual: {
    none:    "For <strong>Casual</strong> — pick any top or blazer to start",
    outer:   "Nice! Now choose a <strong>shirt or t-shirt</strong>",
    top:     "Now pick your <strong>pants</strong> — denims or chinos work great",
    pants:   "Finish it off with <strong>shoes</strong>",
    done:    "Great casual outfit! 👌",
  },
  'casual-friday': {
    none:    "For <strong>Casual Friday</strong> — try a casual blazer to start",
    outer:   "Nice choice! Pair it with a <strong>shirt or polo</strong>",
    top:     "Now pick your <strong>jeans or chinos</strong>",
    pants:   "Finish with <strong>clean sneakers or loafers</strong>",
    done:    "Perfect Casual Friday look! 🎉",
  },
  formal: {
    none:    "For <strong>Formal</strong> — start with a suit or formal blazer",
    outer:   "Excellent! Now pick a <strong>formal shirt</strong>",
    top:     "Choose your <strong>formal trousers</strong>",
    pants:   "Complete the look with a <strong>belt and dress shoes</strong>",
    done:    "Very sharp formal outfit! 👔",
  },
  weekend: {
    none:    "For <strong>Weekend</strong> — keep it relaxed, start with a casual top",
    outer:   "Laid back! Now pick a <strong>t-shirt or casual shirt</strong>",
    top:     "Go for comfortable <strong>casual pants or jeans</strong>",
    pants:   "Finish with your favourite <strong>sneakers</strong>",
    done:    "Perfect weekend look! 😎",
  },
};

function updateHintStrip() {
  const hintStrip = document.getElementById('hintStrip');
  const hintText  = document.getElementById('hintText');
  const hints = HINTS[currentScenario];
  if (!hints) return;

  const hasOuter = !!selected['outer'];
  const hasTop   = !!selected['top'];
  const hasPants = !!selected['pants'];
  const hasShoes = !!selected['shoes'];
  const hasBelt  = !!selected['belts'];
  const totalSelected = Object.keys(selected).length;

  let key = 'none';
  if (totalSelected === 0) key = 'none';
  else if (!hasOuter && !hasTop) key = 'none';
  else if (hasOuter && !hasTop) key = 'outer';
  else if (hasTop && !hasPants) key = 'top';
  else if (hasPants && (!hasShoes || !hasBelt)) key = 'pants';
  else key = 'done';

  hintText.innerHTML = hints[key];
  hintStrip.classList.add('visible');
}


function setScenario(el, scenario) {
  document.querySelectorAll('.scenario-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  currentScenario = scenario;
  renderCarousel(currentCat, currentSub, currentSubSub);
}

function setCategory(el, cat) {
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentCat = cat;
  currentSub = 'All';
  currentSubSub = 'All';
  renderSubTabs(cat);
  renderSubSubTabs(cat, 'All');
  renderCarousel(cat, 'All', 'All');
}

function renderSubTabs(cat) {
  const subTabs = document.getElementById('subTabs');
  subTabs.innerHTML = '';
  const subs = SUB_CATS[cat] || ['All'];
  subs.forEach(sub => {
    const btn = document.createElement('button');
    btn.className = 'sub-tab' + (sub === currentSub ? ' active' : '');
    btn.textContent = sub;
    btn.onclick = () => {
      document.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      currentSub = sub;
      currentSubSub = 'All';
      renderSubSubTabs(currentCat, sub);
      renderCarousel(currentCat, sub, 'All');
    };
    subTabs.appendChild(btn);
  });
}

function renderSubSubTabs(cat, sub) {
  const subsubTabs = document.getElementById('subsubTabs');
  subsubTabs.innerHTML = '';
  const subsubs = SUBSUB_CATS[cat]?.[sub];
  if (!subsubs) return; // hide row if no subsubs
  subsubs.forEach(ss => {
    const btn = document.createElement('button');
    btn.className = 'subsub-tab' + (ss === currentSubSub ? ' active' : '');
    btn.textContent = ss;
    btn.onclick = () => {
      document.querySelectorAll('.subsub-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      currentSubSub = ss;
      renderCarousel(currentCat, currentSub, ss);
    };
    subsubTabs.appendChild(btn);
  });
}

function renderCarousel(cat, sub, subsub) {
  const carousel = document.getElementById('carousel');
  carousel.innerHTML = '';

  let items = catalog[cat] || [];
  if (sub && sub !== 'All') items = items.filter(i => i.sub === sub);
  if (subsub && subsub !== 'All') items = items.filter(i => i.subsub === subsub);

  // Sort by sub order, then subsub order, then alphabetical
  const subOrder = SUB_CATS[cat] || [];
  const subsubOrder = SUBSUB_CATS[cat] || {};
  items = [...items].sort((a, b) => {
    const subA = subOrder.indexOf(a.sub);
    const subB = subOrder.indexOf(b.sub);
    if (subA !== subB) return subA - subB;
    const ssOrder = subsubOrder[a.sub] || [];
    const ssA = ssOrder.indexOf(a.subsub) ?? -1;
    const ssB = ssOrder.indexOf(b.subsub) ?? -1;
    if (ssA !== ssB) return ssA - ssB;
    return a.name.localeCompare(b.name);
  });

  if (items.length === 0) {
    carousel.innerHTML = `<div class="empty-carousel">Coming soon!</div>`;
    return;
  }

  const slotKey = SLOT_MAP[cat];
  items.forEach(item => {
    const isSelected = selected[slotKey]?.name === item.name && selected[slotKey]?.cat === cat;
    const aiMatch = Object.keys(selected).length > 0 && !item.swatch && isAIMatch(cat, item.file);

    if (item.swatch) {
      // Render color swatch card
      const card = document.createElement('div');
      card.className = 'swatch-item' + (isSelected ? ' selected' : '');
      card.innerHTML = `
        <div class="swatch-color" style="background:${item.color}; border-bottom: 1px solid ${item.border};"></div>
        <div class="swatch-name">${item.name}</div>
      `;
      card.onclick = () => selectSwatch(cat, item, card);
      carousel.appendChild(card);
    } else {
      // Render image card
      const card = document.createElement('div');
      card.className = 'car-item' + (isSelected ? ' selected' : '');
      card.innerHTML = `
        ${aiMatch ? '<div class="match-badge">⭐</div>' : ''}
        <img src="${CATALOG_BASE}/${cat}/${item.file}?v=${VERSION}" alt="${item.name}" loading="lazy">
        <div class="car-name">${item.name}</div>
      `;
      card.onclick = () => selectItem(cat, item, card);
      carousel.appendChild(card);
    }
  });
}

function selectItem(cat, item, card) {
  const slotKey = SLOT_MAP[cat];

  // Deselect if tapping same item
  if (selected[slotKey]?.file === item.file && selected[slotKey]?.cat === cat) {
    delete selected[slotKey];
    card.classList.remove('selected');
    clearSlot(slotKey);
    updateSuitMode();
    return;
  }

  // Select new item
  document.querySelectorAll('.car-item').forEach(c => c.classList.remove('selected'));
  selected[slotKey] = { ...item, cat };
  card.classList.add('selected');
  fillSlot(slotKey, cat, item);
  updateSuitMode();

}

function selectSwatch(cat, item, card) {
  const slotKey = SLOT_MAP[cat];
  if (selected[slotKey]?.name === item.name && selected[slotKey]?.cat === cat) {
    delete selected[slotKey];
    card.classList.remove('selected');
    clearSlot(slotKey);
  
    return;
  }
  document.querySelectorAll('.swatch-item').forEach(c => c.classList.remove('selected'));
  selected[slotKey] = { ...item, cat };
  card.classList.add('selected');
  fillSwatchSlot(slotKey, item);

}

function fillSwatchSlot(slotKey, item) {
  const slot = document.getElementById(`slot-${slotKey}`);
  if (!slot) return;
  slot.classList.add('filled');
  slot.innerHTML = `
    <div style="width:100%;height:100%;background:${item.color};border-radius:10px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;">
      <div style="font-size:12px;font-weight:600;color:${item.color === '#FFFFFF' ? '#1c1c1e' : '#fff'}">${item.name}</div>
    </div>
    <button class="remove-btn" onclick="removeItem('${slotKey}')">✕</button>
  `;
}

function fillSlot(slotKey, cat, item) {
  const slot = document.getElementById(`slot-${slotKey}`);
  if (!slot) return;
  slot.classList.add('filled');
  slot.innerHTML = `
    <img src="${CATALOG_BASE}/${cat}/${item.file}?v=${VERSION}" alt="${item.name}">
    <div class="slot-name">${item.name}</div>
    <button class="remove-btn" onclick="removeItem('${slotKey}')">✕</button>
  `;
}

function clearSlot(slotKey) {
  const slot = document.getElementById(`slot-${slotKey}`);
  if (!slot) return;
  slot.classList.remove('filled');
  slot.innerHTML = `<div class="empty-label">${SLOT_LABELS[slotKey]}</div>`;
}

function removeItem(slotKey) {
  delete selected[slotKey];
  clearSlot(slotKey);
  updateSuitMode();

  renderCarousel(currentCat, currentSub, currentSubSub);
}

function updateSuitMode() {
  const canvas = document.getElementById('outfitCanvas');
  const outerItem = selected['outer'];
  if (outerItem?.cat === 'suits') {
    canvas.classList.add('suit-mode');
  } else {
    canvas.classList.remove('suit-mode');
  }
}

// Init
renderSubTabs('tops');
renderSubSubTabs('tops', 'All');
renderCarousel('tops', 'All', 'All');
</script>
