<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>My Wardrobe</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f0f0;
    height: 100dvh;
    overflow: hidden;
  }

  /* ── HEADER ── */
  .header {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 50;
    padding: 10px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid #e5e5ea;
  }

  .scenario-pill {
    flex: 1;
    padding: 7px 4px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    border: none;
    background: #f2f2f7;
    color: #8e8e93;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .scenario-pill.active {
    background: #1c1c1e;
    color: #fff;
  }

  /* ── OUTFIT PREVIEW ── */
  .preview-area {
    position: absolute;
    top: 50px; left: 0; right: 0;
    bottom: 270px;
    background: #fff;
    padding: 12px;
  }

  /* 2-column x 4-row grid */
  .outfit-canvas {
    width: 100%;
    height: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr 1fr 1fr;
    gap: 8px;
  }

  /* Slot base */
  .outfit-slot {
    border-radius: 12px;
    background: #f2f2f7;
    border: 2px dashed #d1d1d6;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    transition: all 0.3s ease;
    min-height: 0;
  }
  .outfit-slot.filled {
    border: 2px solid #e5e5ea;
    background: #fff;
  }
  .outfit-slot img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  .outfit-slot .empty-label {
    font-size: 11px;
    color: #c7c7cc;
    text-align: center;
  }
  .outfit-slot .slot-name {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.45);
    color: white;
    font-size: 9px;
    padding: 3px 6px;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .outfit-slot .remove-btn {
    position: absolute;
    top: 4px; right: 4px;
    width: 22px; height: 22px;
    background: rgba(0,0,0,0.5);
    color: white;
    border: none;
    border-radius: 50%;
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Grid placement — BLAZER mode */
  #slot-outer  { grid-column: 1; grid-row: 1 / 3; }
  #slot-top    { grid-column: 2; grid-row: 1 / 3; }
  #slot-pants  { grid-column: 1; grid-row: 3 / 5; }
  #slot-belts  { grid-column: 2; grid-row: 3; }
  #slot-shoes  { grid-column: 2; grid-row: 4; }

  /* SUIT mode — outer spans full height */
  .suit-mode #slot-outer { grid-row: 1 / 5; }
  .suit-mode #slot-pants { display: none; }

  /* ── BOTTOM PANEL ── */
  .bottom-panel {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 290px;
    background: #f2f2f7;
    border-top: 1px solid #e5e5ea;
    display: flex;
    flex-direction: column;
    z-index: 40;
  }

  /* AI match strip — above carousel */
  .match-strip {
    display: none;
    align-items: center;
    gap: 6px;
    padding: 3px 16px;
    flex-shrink: 0;
  }
  .match-strip.visible { display: flex; }
  .match-strip span {
    font-size: 11px;
    color: #3a8a3a;
    font-weight: 500;
  }
  .match-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #34c759;
    flex-shrink: 0;
  }

  /* Hint strip — below carousel */
  .hint-strip {
    display: none;
    padding: 5px 16px;
    flex-shrink: 0;
    border-top: 1px solid #e5e5ea;
  }
  .hint-strip.visible { display: block; }
  .hint-strip p {
    font-size: 11px;
    color: #636366;
    line-height: 1.4;
  }
  .hint-strip strong { color: #1c1c1e; }

  /* Main category tabs */
  .cat-tabs {
    display: flex;
    gap: 8px;
    padding: 10px 16px 6px;
    overflow-x: auto;
    flex-shrink: 0;
  }
  .cat-tabs::-webkit-scrollbar { display: none; }
  .cat-tab {
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    border: none;
    background: #e5e5ea;
    color: #8e8e93;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .cat-tab.active {
    background: #1c1c1e;
    color: #fff;
  }

  /* Sub-category tabs */
  .sub-tabs {
    display: flex;
    gap: 6px;
    padding: 4px 16px 6px;
    overflow-x: auto;
    flex-shrink: 0;
  }
  .sub-tabs::-webkit-scrollbar { display: none; }
  .sub-tab {
    padding: 3px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    border: 1.5px solid #d1d1d6;
    background: transparent;
    color: #8e8e93;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .sub-tab.active {
    background: #fff;
    color: #1c1c1e;
    border-color: #1c1c1e;
  }

  /* Carousel */
  .carousel {
    flex: 1;
    display: flex;
    gap: 8px;
    padding: 4px 16px 12px;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    align-items: flex-start;
  }
  .carousel::-webkit-scrollbar { display: none; }

  .car-item {
    flex-shrink: 0;
    width: 115px;
    border-radius: 12px;
    background: #fff;
    border: 2px solid transparent;
    cursor: pointer;
    scroll-snap-align: start;
    transition: all 0.2s;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .car-item.selected {
    border-color: #1c1c1e;
  }
  .car-item img {
    width: 100%;
    height: 100px;
    object-fit: contain;
    background: #fff;
    padding: 4px;
  }
  .car-item .car-name {
    padding: 3px 8px 5px;
    font-size: 10px;
    font-weight: 500;
    color: #3a3a3c;
    line-height: 1.3;
    display: flex;
    align-items: center;
  }

  .empty-carousel {
    color: #c7c7cc;
    font-size: 13px;
    padding: 20px;
    align-self: center;
  }
</style>
</head>
<body>

<!-- HEADER — Scenario selector -->
<div class="header">
  <button class="scenario-pill active" onclick="setScenario(this,'office')">Office</button>
  <button class="scenario-pill" onclick="setScenario(this,'casual')">Casual</button>
  <button class="scenario-pill" onclick="setScenario(this,'casual-friday')">Casual Friday</button>
  <button class="scenario-pill" onclick="setScenario(this,'formal')">Formal</button>
  <button class="scenario-pill" onclick="setScenario(this,'weekend')">Weekend</button>
</div>

<!-- OUTFIT PREVIEW -->
<div class="preview-area">
  <div class="outfit-canvas" id="outfitCanvas">
    <div class="outfit-slot" id="slot-outer"><div class="empty-label">Blazer</div></div>
    <div class="outfit-slot" id="slot-top"><div class="empty-label">Shirt</div></div>
    <div class="outfit-slot" id="slot-pants"><div class="empty-label">Pants</div></div>
    <div class="outfit-slot" id="slot-belts"><div class="empty-label">Belt</div></div>
    <div class="outfit-slot" id="slot-shoes"><div class="empty-label">Shoes</div></div>
  </div>
</div>

<!-- BOTTOM PANEL -->
<div class="bottom-panel">
  <div class="cat-tabs" id="catTabs">
    <button class="cat-tab active" onclick="setCategory(this,'blazers')">Blazers</button>
    <button class="cat-tab" onclick="setCategory(this,'suits')">Suits</button>
    <button class="cat-tab" onclick="setCategory(this,'jackets')">Jackets</button>
    <button class="cat-tab" onclick="setCategory(this,'shirts')">Shirts</button>
    <button class="cat-tab" onclick="setCategory(this,'tshirts')">T-Shirts</button>
    <button class="cat-tab" onclick="setCategory(this,'pants')">Pants</button>
    <button class="cat-tab" onclick="setCategory(this,'belts')">Belts</button>
    <button class="cat-tab" onclick="setCategory(this,'shoes')">Shoes</button>
  </div>
  <div class="sub-tabs" id="subTabs"></div>
  <div class="match-strip" id="matchStrip">
    <div class="match-dot"></div>
    <span id="matchText">Showing items that match your selection</span>
  </div>
  <div class="carousel" id="carousel"></div>
  <div class="hint-strip" id="hintStrip">
    <p id="hintText"></p>
  </div>
</div>

<script>
const CATALOG_BASE = "catalog";

const SLOT_MAP = {
  blazers: 'outer', suits: 'outer', jackets: 'outer',
  shirts: 'top', tshirts: 'top',
  pants: 'pants', belts: 'belts', shoes: 'shoes',
};

const SLOT_LABELS = {
  outer: 'Blazer / Suit', top: 'Shirt / T-Shirt',
  pants: 'Pants', belts: 'Belt', shoes: 'Shoes',
};

// Sub-categories per main category
const SUB_CATS = {
  blazers: ['All', 'Formal', 'Casual'],
  suits:   ['All'],
  jackets: ['All'],
  shirts:  ['All', 'Formal', 'Casual'],
  tshirts: ['All'],
  pants:   ['All', 'Denim', 'Chino', 'Casual'],
  belts:   ['All'],
  shoes:   ['All', 'Sneakers', 'Boots', 'Dress', 'Loafers'],
};

const catalog = {
  blazers: [
    { file: "blazer_formal_charcoal_grey.png", name: "Charcoal Grey Blazer", sub: "Formal" },
    { file: "blazer_formal_mid_blue.png", name: "Mid Blue Blazer", sub: "Formal" },
    { file: "blazer_formal_navy.png", name: "Navy Blazer", sub: "Formal" },
    { file: "blazer_formal_dark_charcoal_burgundy_lining.png", name: "Dark Charcoal Blazer", sub: "Formal" },
    { file: "blazer_casual_blue_wool.png", name: "Blue Wool Blazer", sub: "Casual" },
    { file: "blazer_casual_beige_linen.png", name: "Beige Linen Blazer", sub: "Casual" },
    { file: "blazer_casual_grey_check.png", name: "Grey Check Blazer", sub: "Casual" },
  ],
  suits: [],
  jackets: [],
  shirts: [
    { file: "shirts_formal.png", name: "Formal Shirts", sub: "Formal" },
  ],
  tshirts: [],
  pants: [
    { file: "pants_casual_levis_linen_olive.png", name: "Levi's Linen Olive", sub: "Casual" },
    { file: "pants_casual_levis_nylon_khaki_utility.png", name: "Levi's Khaki Utility", sub: "Casual" },
    { file: "pants_casual_olive_linen_elastic.png", name: "Olive Linen Elastic", sub: "Casual" },
    { file: "pants_casual_cat_cotton_brown_work.png", name: "CAT Brown Work Pant", sub: "Casual" },
    { file: "pants_chino_allensolly_black.png", name: "Allen Solly Black Chino", sub: "Chino" },
    { file: "pants_chino_allensolly_dark_olive.png", name: "Allen Solly Dark Olive", sub: "Chino" },
    { file: "pants_chino_allensolly_khaki.png", name: "Allen Solly Khaki", sub: "Chino" },
    { file: "pants_chino_white_cotton.png", name: "White Cotton Chino", sub: "Chino" },
    { file: "pants_chino_beige_cotton.png", name: "Beige Cotton Chino", sub: "Chino" },
    { file: "pants_chino_wrangler_beige.png", name: "Wrangler Beige Chino", sub: "Chino" },
    { file: "pants_denim_levis_dark_wash.png", name: "Levi's Dark Wash", sub: "Denim" },
    { file: "pants_denim_levis_mid_blue.png", name: "Levi's Mid Blue", sub: "Denim" },
    { file: "pants_denim_levis_light_wash.png", name: "Levi's Light Wash", sub: "Denim" },
    { file: "pants_denim_westbay_dark_indigo.png", name: "Westbay Dark Indigo", sub: "Denim" },
    { file: "pants_denim_lee_mid_blue_faded.png", name: "Lee Mid Blue Faded", sub: "Denim" },
    { file: "pants_denim_levis_dark_blue.png", name: "Levi's Dark Blue", sub: "Denim" },
    { file: "pants_denim_casualjeans_light_blue.png", name: "Light Blue Casual Jeans", sub: "Denim" },
  ],
  belts: [],
  shoes: [
    { file: "shoes_sneaker_uspolo_white_red_navy.png", name: "US Polo White Sneaker", sub: "Sneakers" },
    { file: "shoes_sneaker_uspolo_black_white_laces.png", name: "US Polo Black Sneaker", sub: "Sneakers" },
    { file: "shoes_sneaker_wildrhino_brown_leather.png", name: "Wild Rhino Brown", sub: "Sneakers" },
    { file: "shoes_boot_colorado_black_leather_chelsea.png", name: "Colorado Black Chelsea", sub: "Boots" },
    { file: "shoes_sneaker_adidas_black_white.png", name: "Adidas Black & White", sub: "Sneakers" },
    { file: "shoes_sneaker_wildrhino_olive.png", name: "Wild Rhino Olive", sub: "Sneakers" },
  ]
};

// State
let selected = {};
let currentCat = 'blazers';
let currentSub = 'All';
let currentScenario = 'office';

// Hint messages per scenario + what's been selected
const HINTS = {
  office: {
    none:    "For <strong>Office</strong> — start by picking a blazer or suit",
    outer:   "Great start! Now pick a <strong>shirt</strong> to go with it",
    top:     "Looking sharp! Now choose your <strong>pants</strong>",
    pants:   "Almost there — pick a <strong>belt</strong> and <strong>shoes</strong> to finish",
    done:    "Outfit complete! Looking office-ready 💼",
  },
  casual: {
    none:    "For <strong>Casual</strong> — pick any top or blazer to start",
    outer:   "Nice! Now choose a <strong>shirt or t-shirt</strong>",
    top:     "Now pick your <strong>pants</strong> — denims or chinos work great",
    pants:   "Finish it off with <strong>shoes</strong>",
    done:    "Great casual outfit! 👌",
  },
  'casual-friday': {
    none:    "For <strong>Casual Friday</strong> — try a casual blazer to start",
    outer:   "Nice choice! Pair it with a <strong>shirt or polo</strong>",
    top:     "Now pick your <strong>jeans or chinos</strong>",
    pants:   "Finish with <strong>clean sneakers or loafers</strong>",
    done:    "Perfect Casual Friday look! 🎉",
  },
  formal: {
    none:    "For <strong>Formal</strong> — start with a suit or formal blazer",
    outer:   "Excellent! Now pick a <strong>formal shirt</strong>",
    top:     "Choose your <strong>formal trousers</strong>",
    pants:   "Complete the look with a <strong>belt and dress shoes</strong>",
    done:    "Very sharp formal outfit! 👔",
  },
  weekend: {
    none:    "For <strong>Weekend</strong> — keep it relaxed, start with a casual top",
    outer:   "Laid back! Now pick a <strong>t-shirt or casual shirt</strong>",
    top:     "Go for comfortable <strong>casual pants or jeans</strong>",
    pants:   "Finish with your favourite <strong>sneakers</strong>",
    done:    "Perfect weekend look! 😎",
  },
};

function updateHintStrip() {
  const hintStrip = document.getElementById('hintStrip');
  const hintText  = document.getElementById('hintText');
  const hints = HINTS[currentScenario];
  if (!hints) return;

  const hasOuter = !!selected['outer'];
  const hasTop   = !!selected['top'];
  const hasPants = !!selected['pants'];
  const hasShoes = !!selected['shoes'];
  const hasBelt  = !!selected['belts'];
  const totalSelected = Object.keys(selected).length;

  let key = 'none';
  if (totalSelected === 0) key = 'none';
  else if (!hasOuter && !hasTop) key = 'none';
  else if (hasOuter && !hasTop) key = 'outer';
  else if (hasTop && !hasPants) key = 'top';
  else if (hasPants && (!hasShoes || !hasBelt)) key = 'pants';
  else key = 'done';

  hintText.innerHTML = hints[key];
  hintStrip.classList.add('visible');
}

function updateMatchStrip() {
  const matchStrip = document.getElementById('matchStrip');
  const matchText  = document.getElementById('matchText');
  const totalSelected = Object.keys(selected).length;

  if (totalSelected > 0) {
    const names = Object.values(selected).map(i => i.name).join(', ');
    matchText.textContent = `Matched to: ${names}`;
    matchStrip.classList.add('visible');
  } else {
    matchStrip.classList.remove('visible');
  }
}

function setScenario(el, scenario) {
  document.querySelectorAll('.scenario-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  currentScenario = scenario;
  updateHintStrip();
  renderCarousel(currentCat, currentSub);
}

function setCategory(el, cat) {
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentCat = cat;
  currentSub = 'All';
  renderSubTabs(cat);
  renderCarousel(cat, 'All');
}

function renderSubTabs(cat) {
  const subTabs = document.getElementById('subTabs');
  subTabs.innerHTML = '';
  const subs = SUB_CATS[cat] || ['All'];
  subs.forEach(sub => {
    const btn = document.createElement('button');
    btn.className = 'sub-tab' + (sub === currentSub ? ' active' : '');
    btn.textContent = sub;
    btn.onclick = () => {
      document.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      currentSub = sub;
      renderCarousel(currentCat, sub);
    };
    subTabs.appendChild(btn);
  });
}

function renderCarousel(cat, sub) {
  const carousel = document.getElementById('carousel');
  carousel.innerHTML = '';

  let items = catalog[cat] || [];
  if (sub && sub !== 'All') {
    items = items.filter(i => i.sub === sub);
  }

  if (items.length === 0) {
    carousel.innerHTML = `<div class="empty-carousel">Coming soon!</div>`;
    return;
  }

  const slotKey = SLOT_MAP[cat];
  items.forEach(item => {
    const isSelected = selected[slotKey]?.file === item.file && selected[slotKey]?.cat === cat;
    const card = document.createElement('div');
    card.className = 'car-item' + (isSelected ? ' selected' : '');
    card.innerHTML = `
      <img src="${CATALOG_BASE}/${cat}/${item.file}" alt="${item.name}" loading="lazy">
      <div class="car-name">${item.name}</div>
    `;
    card.onclick = () => selectItem(cat, item, card);
    carousel.appendChild(card);
  });
}

function selectItem(cat, item, card) {
  const slotKey = SLOT_MAP[cat];

  // Deselect if tapping same item
  if (selected[slotKey]?.file === item.file && selected[slotKey]?.cat === cat) {
    delete selected[slotKey];
    card.classList.remove('selected');
    clearSlot(slotKey);
    updateSuitMode();
    return;
  }

  // Select new item
  document.querySelectorAll('.car-item').forEach(c => c.classList.remove('selected'));
  selected[slotKey] = { ...item, cat };
  card.classList.add('selected');
  fillSlot(slotKey, cat, item);
  updateSuitMode();
  updateHintStrip();
  updateMatchStrip();
}

function fillSlot(slotKey, cat, item) {
  const slot = document.getElementById(`slot-${slotKey}`);
  if (!slot) return;
  slot.classList.add('filled');
  slot.innerHTML = `
    <img src="${CATALOG_BASE}/${cat}/${item.file}" alt="${item.name}">
    <div class="slot-name">${item.name}</div>
    <button class="remove-btn" onclick="removeItem('${slotKey}')">✕</button>
  `;
}

function clearSlot(slotKey) {
  const slot = document.getElementById(`slot-${slotKey}`);
  if (!slot) return;
  slot.classList.remove('filled');
  slot.innerHTML = `<div class="empty-label">${SLOT_LABELS[slotKey]}</div>`;
}

function removeItem(slotKey) {
  delete selected[slotKey];
  clearSlot(slotKey);
  updateSuitMode();
  updateHintStrip();
  updateMatchStrip();
  renderCarousel(currentCat, currentSub);
}

function updateSuitMode() {
  const canvas = document.getElementById('outfitCanvas');
  const outerItem = selected['outer'];
  if (outerItem?.cat === 'suits') {
    canvas.classList.add('suit-mode');
  } else {
    canvas.classList.remove('suit-mode');
  }
}

// Init
renderSubTabs('blazers');
renderCarousel('blazers', 'All');
updateHintStrip();
</script>
</body>
</html>
