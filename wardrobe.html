<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>My Wardrobe</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f2f2f7;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 24px;
  }

  .home-title {
    font-size: 28px;
    font-weight: 700;
    color: #1c1c1e;
    margin-bottom: 8px;
    text-align: center;
  }

  .home-subtitle {
    font-size: 14px;
    color: #8e8e93;
    margin-bottom: 24px;
    text-align: center;
  }

  .nav-btn {
    width: 100%;
    max-width: 320px;
    padding: 18px 24px;
    border-radius: 16px;
    background: #fff;
    border: none;
    cursor: pointer;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    text-decoration: none;
    transition: all 0.2s;
  }
  .nav-btn:active { transform: scale(0.98); }

  .nav-icon {
    font-size: 28px;
    width: 48px;
    height: 48px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .nav-text { flex: 1; }
  .nav-label {
    font-size: 16px;
    font-weight: 600;
    color: #1c1c1e;
  }
  .nav-desc {
    font-size: 12px;
    color: #8e8e93;
    margin-top: 2px;
  }

  .nav-arrow {
    font-size: 18px;
    color: #c7c7cc;
  }

  .disabled {
    opacity: 0.4;
    pointer-events: none;
  }
</style>
</head>
<body>

  <div class="home-title">👔 My Wardrobe</div>
  <div class="home-subtitle">What would you like to do?</div>

  <a class="nav-btn" href="builder.html">
    <div class="nav-icon" style="background:#e8f0fe;">🧥</div>
    <div class="nav-text">
      <div class="nav-label">Outfit Builder</div>
      <div class="nav-desc">Build and match your outfit for today</div>
    </div>
    <div class="nav-arrow">›</div>
  </a>


  <a class="nav-btn" href="catalog-view.html">
    <div class="nav-icon" style="background:#fef3e2;">👗</div>
    <div class="nav-text">
      <div class="nav-label">Catalog</div>
      <div class="nav-desc">Browse all your clothing items</div>
    </div>
    <div class="nav-arrow">›</div>
  </a>

  <a class="nav-btn" href="catalog-attributes.html">
    <div class="nav-icon" style="background:#f5eeff;">🏷️</div>
    <div class="nav-text">
      <div class="nav-label">Attributes</div>
      <div class="nav-desc">Review item attributes and data</div>
    </div>
    <div class="nav-arrow">›</div>
  </a>

  <a class="nav-btn" href="wardrobe-config.html">
    <div class="nav-icon" style="background:#e6f4ea;">⚙️</div>
    <div class="nav-text">
      <div class="nav-label">Config</div>
      <div class="nav-desc">Categories, subcategories and structure</div>
    </div>
    <div class="nav-arrow">›</div>
  </a>

</body>
</html>
