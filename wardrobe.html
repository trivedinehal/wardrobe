<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>My Wardrobe</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f0f0;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  .header {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 50;
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .header h1 { font-size: 20px; font-weight: 700; color: #1c1c1e; }
  .ai-btn {
    background: #1c1c1e;
    color: #fff;
    border: none;
    border-radius: 20px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* ── OUTFIT PREVIEW (full screen background) ── */
  .preview-area {
    position: absolute;
    top: 0; left: 0; right: 0;
    bottom: 300px;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 70px 16px 16px;
  }

  .outfit-canvas {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .outfit-row {
    display: flex;
    gap: 12px;
    align-items: flex-end;
    justify-content: center;
    width: 100%;
  }

  .outfit-slot {
    flex: 1;
    max-width: 160px;
    aspect-ratio: 3/4;
    border-radius: 12px;
    background: #f2f2f7;
    border: 2px dashed #d1d1d6;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    transition: all 0.3s ease;
  }
  .outfit-slot.filled {
    border: 2px solid #e5e5ea;
    background: #fff;
  }
  .outfit-slot img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  .outfit-slot .empty-label {
    font-size: 11px;
    color: #c7c7cc;
    text-align: center;
    padding: 8px;
  }
  .outfit-slot .slot-name {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.45);
    color: white;
    font-size: 9px;
    padding: 3px 6px;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .outfit-slot .remove-btn {
    position: absolute;
    top: 4px; right: 4px;
    width: 20px; height: 20px;
    background: rgba(0,0,0,0.5);
    color: white;
    border: none;
    border-radius: 50%;
    font-size: 11px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }

  /* ── BOTTOM SHEET ── */
  .bottom-sheet {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 310px;
    background: #fff;
    border-radius: 24px 24px 0 0;
    box-shadow: 0 -4px 24px rgba(0,0,0,0.10);
    display: flex;
    flex-direction: column;
    z-index: 40;
  }

  .drag-handle {
    width: 36px;
    height: 4px;
    background: #d1d1d6;
    border-radius: 2px;
    margin: 10px auto 0;
    flex-shrink: 0;
  }

  /* Category tabs */
  .cat-tabs {
    display: flex;
    gap: 8px;
    padding: 12px 16px 8px;
    overflow-x: auto;
    flex-shrink: 0;
  }
  .cat-tabs::-webkit-scrollbar { display: none; }
  .cat-tab {
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    border: none;
    background: #f2f2f7;
    color: #8e8e93;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .cat-tab.active {
    background: #1c1c1e;
    color: #fff;
  }

  /* Carousel */
  .carousel {
    flex: 1;
    display: flex;
    gap: 10px;
    padding: 4px 16px 16px;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    align-items: stretch;
  }
  .carousel::-webkit-scrollbar { display: none; }

  .car-item {
    flex-shrink: 0;
    width: 130px;
    border-radius: 14px;
    background: #f8f8f8;
    border: 2px solid transparent;
    cursor: pointer;
    scroll-snap-align: start;
    transition: all 0.2s;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .car-item.selected {
    border-color: #1c1c1e;
    background: #fff;
  }
  .car-item img {
    width: 100%;
    height: 160px;
    object-fit: contain;
    background: #f8f8f8;
    padding: 6px;
  }
  .car-item .car-name {
    padding: 5px 8px 7px;
    font-size: 10px;
    font-weight: 500;
    color: #3a3a3c;
    line-height: 1.3;
    flex: 1;
    display: flex;
    align-items: center;
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <h1>My Wardrobe</h1>
  <button class="ai-btn" onclick="aiSuggest()">✨ AI Suggest</button>
</div>

<!-- OUTFIT PREVIEW -->
<div class="preview-area">
  <div class="outfit-canvas">
    <!-- Row 1: Blazer + Shirt -->
    <div class="outfit-row">
      <div class="outfit-slot" id="slot-blazers">
        <div class="empty-label">Blazer</div>
      </div>
      <div class="outfit-slot" id="slot-shirts">
        <div class="empty-label">Shirt</div>
      </div>
    </div>
    <!-- Row 2: Pants + Shoes -->
    <div class="outfit-row">
      <div class="outfit-slot" id="slot-pants">
        <div class="empty-label">Pants</div>
      </div>
      <div class="outfit-slot" id="slot-shoes">
        <div class="empty-label">Shoes</div>
      </div>
    </div>
  </div>
</div>

<!-- BOTTOM SHEET -->
<div class="bottom-sheet">
  <div class="drag-handle"></div>

  <div class="cat-tabs">
    <button class="cat-tab active" onclick="setCategory(this,'blazers')">Blazers</button>
    <button class="cat-tab" onclick="setCategory(this,'shirts')">Shirts</button>
    <button class="cat-tab" onclick="setCategory(this,'pants')">Pants</button>
    <button class="cat-tab" onclick="setCategory(this,'shoes')">Shoes</button>
  </div>

  <div class="carousel" id="carousel"></div>
</div>

<script>
const CATALOG_BASE = "catalog";

const catalog = {
  blazers: [
    { file: "blazer_formal_charcoal_grey.png", name: "Charcoal Grey Blazer" },
    { file: "blazer_formal_mid_blue.png", name: "Mid Blue Blazer" },
    { file: "blazer_formal_navy.png", name: "Navy Blazer" },
    { file: "blazer_formal_dark_charcoal_burgundy_lining.png", name: "Dark Charcoal Blazer" },
    { file: "blazer_casual_blue_wool.png", name: "Blue Wool Blazer" },
    { file: "blazer_casual_beige_linen.png", name: "Beige Linen Blazer" },
    { file: "blazer_casual_grey_check.png", name: "Grey Check Blazer" },
  ],
  shirts: [
    { file: "shirts_formal.png", name: "Formal Shirts" },
  ],
  pants: [
    { file: "pants_casual_levis_linen_olive.png", name: "Levi's Linen Olive" },
    { file: "pants_casual_levis_nylon_khaki_utility.png", name: "Levi's Khaki Utility" },
    { file: "pants_casual_olive_linen_elastic.png", name: "Olive Linen Elastic" },
    { file: "pants_casual_cat_cotton_brown_work.png", name: "CAT Brown Work Pant" },
    { file: "pants_chino_allensolly_black.png", name: "Allen Solly Black Chino" },
    { file: "pants_chino_allensolly_dark_olive.png", name: "Allen Solly Dark Olive" },
    { file: "pants_chino_allensolly_khaki.png", name: "Allen Solly Khaki" },
    { file: "pants_chino_white_cotton.png", name: "White Cotton Chino" },
    { file: "pants_chino_beige_cotton.png", name: "Beige Cotton Chino" },
    { file: "pants_chino_wrangler_beige.png", name: "Wrangler Beige Chino" },
    { file: "pants_denim_levis_dark_wash.png", name: "Levi's Dark Wash" },
    { file: "pants_denim_levis_mid_blue.png", name: "Levi's Mid Blue" },
    { file: "pants_denim_levis_light_wash.png", name: "Levi's Light Wash" },
    { file: "pants_denim_westbay_dark_indigo.png", name: "Westbay Dark Indigo" },
    { file: "pants_denim_lee_mid_blue_faded.png", name: "Lee Mid Blue Faded" },
    { file: "pants_denim_levis_dark_blue.png", name: "Levi's Dark Blue" },
    { file: "pants_denim_casualjeans_light_blue.png", name: "Light Blue Casual Jeans" },
  ],
  shoes: [
    { file: "shoes_sneaker_uspolo_white_red_navy.png", name: "US Polo White Sneaker" },
    { file: "shoes_sneaker_uspolo_black_white_laces.png", name: "US Polo Black Sneaker" },
    { file: "shoes_sneaker_wildrhino_brown_leather.png", name: "Wild Rhino Brown" },
    { file: "shoes_boot_colorado_black_leather_chelsea.png", name: "Colorado Black Chelsea" },
    { file: "shoes_sneaker_adidas_black_white.png", name: "Adidas Black & White" },
    { file: "shoes_sneaker_wildrhino_olive.png", name: "Wild Rhino Olive" },
  ]
};

let selected = {};
let currentCat = "blazers";

function setCategory(el, cat) {
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentCat = cat;
  renderCarousel(cat);
}

function renderCarousel(cat) {
  const carousel = document.getElementById('carousel');
  carousel.innerHTML = '';
  const items = catalog[cat] || [];
  items.forEach(item => {
    const card = document.createElement('div');
    card.className = 'car-item' + (selected[cat]?.file === item.file ? ' selected' : '');
    card.innerHTML = `
      <img src="${CATALOG_BASE}/${cat}/${item.file}" alt="${item.name}" loading="lazy">
      <div class="car-name">${item.name}</div>
    `;
    card.onclick = () => selectItem(cat, item, card);
    carousel.appendChild(card);
  });
}

function selectItem(cat, item, card) {
  if (selected[cat]?.file === item.file) {
    delete selected[cat];
    card.classList.remove('selected');
    clearSlot(cat);
    return;
  }
  document.querySelectorAll('.car-item').forEach(c => c.classList.remove('selected'));
  selected[cat] = item;
  card.classList.add('selected');
  fillSlot(cat, item);
}

function fillSlot(cat, item) {
  const slot = document.getElementById(`slot-${cat}`);
  if (!slot) return;
  slot.classList.add('filled');
  slot.innerHTML = `
    <img src="${CATALOG_BASE}/${cat}/${item.file}" alt="${item.name}">
    <div class="slot-name">${item.name}</div>
    <button class="remove-btn" onclick="removeItem('${cat}')">✕</button>
  `;
}

function clearSlot(cat) {
  const slot = document.getElementById(`slot-${cat}`);
  if (!slot) return;
  slot.classList.remove('filled');
  const labels = { blazers:'Blazer', shirts:'Shirt', pants:'Pants', shoes:'Shoes' };
  slot.innerHTML = `<div class="empty-label">${labels[cat]}</div>`;
}

function removeItem(cat) {
  delete selected[cat];
  clearSlot(cat);
  renderCarousel(currentCat);
}

function aiSuggest() {
  const picked = Object.entries(selected);
  if (picked.length === 0) {
    alert("Select at least one item and I'll suggest the rest!");
    return;
  }
  alert("AI suggestions coming soon!");
}

// Init
renderCarousel('blazers');
</script>
</body>
</html>
