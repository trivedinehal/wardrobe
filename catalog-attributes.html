<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catalog Attributes</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f2f2f7;
    color: #1c1c1e;
  }

  /* Header */
  .header {
    background: #fff;
    padding: 16px 24px;
    border-bottom: 1px solid #e5e5ea;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header h1 { font-size: 20px; font-weight: 700; margin-bottom: 2px; }
  .header p { font-size: 12px; color: #8e8e93; }

  .content { padding: 20px 24px; }

  /* Category group */
  .cat-group { margin-bottom: 20px; }

  .cat-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    background: #1c1c1e;
    color: #fff;
    border-radius: 12px 12px 0 0;
    cursor: pointer;
    user-select: none;
  }
  .cat-group.collapsed .cat-header { border-radius: 12px; }
  .cat-header-title { font-size: 14px; font-weight: 700; flex: 1; }
  .cat-header-count { font-size: 12px; color: #8e8e93; }
  .cat-header-arrow { font-size: 12px; transition: transform 0.2s; }
  .cat-group.collapsed .cat-header-arrow { transform: rotate(-90deg); }

  /* Table wrapper — scrollable horizontally */
  .cat-table-wrap {
    overflow-x: auto;
    background: #fff;
    border-radius: 0 0 12px 12px;
    border: 1px solid #e5e5ea;
    border-top: none;
  }
  .cat-group.collapsed .cat-table-wrap { display: none; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    min-width: 900px;
  }

  thead th {
    padding: 8px 12px;
    background: #f8f8f8;
    border-bottom: 1px solid #e5e5ea;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: #8e8e93;
    text-align: left;
    white-space: nowrap;
  }

  tbody tr {
    border-bottom: 1px solid #f2f2f7;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #fafafa; }

  td {
    padding: 10px 12px;
    vertical-align: middle;
  }

  .item-img {
    width: 60px;
    height: 60px;
    object-fit: contain;
    border-radius: 8px;
    background: #f2f2f7;
  }
  .item-swatch {
    width: 60px;
    height: 60px;
    border-radius: 8px;
  }

  .item-name { font-weight: 600; font-size: 12px; min-width: 160px; }
  .item-sub  { color: #636366; font-size: 11px; white-space: nowrap; }

  /* Attribute pill */
  .attr {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 500;
    white-space: nowrap;
  }
  .attr.filled { background: #1c1c1e; color: #fff; }
  .attr.empty  { background: #f2f2f7; color: #c7c7cc; border: 1px dashed #d1d1d6; }

  /* Tone colors */
  .tone-light  { background: #f5f5f5; color: #3a3a3c; border: 1px solid #e5e5ea; }
  .tone-medium { background: #8e8e93; color: #fff; }
  .tone-dark   { background: #1c1c1e; color: #fff; }

  /* Color family */
  .family-warm    { background: #f5deb3; color: #5c3d0e; }
  .family-cool    { background: #cce0f5; color: #0a3d6b; }
  .family-neutral { background: #e5e5ea; color: #3a3a3c; }

  /* Formality */
  .formal       { background: #1c1c1e; color: #fff; }
  .smart-casual { background: #3a6ea5; color: #fff; }
  .casual       { background: #34c759; color: #fff; }

  /* Description cell */
  .desc { font-size: 11px; color: #636366; font-style: italic; min-width: 200px; max-width: 300px; }
  .desc.empty { color: #c7c7cc; }
</style>
</head>
<body>

<div class="header">
  <h1>Catalog Attributes</h1>
  <p>Review item attributes — formality, color, fabric, and matching properties</p>
</div>

<div class="content" id="content"></div>

<script src="catalog.js"></script>
<script>
const CATALOG_BASE = "catalog";

// Which extra columns each category gets
const CAT_EXTRA_COLS = {
  tops:    ['fabric', 'pattern', 'collar', 'tuck'],
  pants:   ['fabric', 'pattern', 'cut', 'hem'],
  belts:   ['buckleStyle', 'width'],
  shoes:   ['closure', 'sole'],
  blazers: ['fabric', 'pattern', 'cut'],
  suits:   ['fabric', 'pattern', 'cut'],
  jackets: [],
};

const COL_LABELS = {
  fabric: 'Fabric', pattern: 'Pattern', cut: 'Cut', hem: 'Hem',
  collar: 'Collar', tuck: 'Tuck',
  buckleStyle: 'Buckle', width: 'Width',
  closure: 'Closure', sole: 'Sole',
};

function attr(val, extraClass) {
  if (!val) return `<span class="attr empty">—</span>`;
  return `<span class="attr filled ${extraClass || ''}">${val}</span>`;
}

function formalityAttr(val) {
  if (!val) return `<span class="attr empty">—</span>`;
  const cls = val === 'Formal' ? 'formal' : val === 'Smart Casual' ? 'smart-casual' : 'casual';
  return `<span class="attr ${cls}">${val}</span>`;
}

function toneAttr(val) {
  if (!val) return `<span class="attr empty">—</span>`;
  const cls = val === 'light' ? 'tone-light' : val === 'medium' ? 'tone-medium' : 'tone-dark';
  return `<span class="attr ${cls}">${val}</span>`;
}

function familyAttr(val) {
  if (!val) return `<span class="attr empty">—</span>`;
  const cls = `family-${val}`;
  return `<span class="attr ${cls}">${val}</span>`;
}

function toggle(el) { el.parentElement.classList.toggle('collapsed'); }

function buildPage() {
  const content = document.getElementById('content');

  CAT_ORDER.forEach(key => {
    const meta = CAT_META[key];
    const items = catalog[key] || [];
    if (items.length === 0) return;

    const extraCols = CAT_EXTRA_COLS[key] || [];

    // Build header row
    const extraHeaders = extraCols.map(c => `<th>${COL_LABELS[c]}</th>`).join('');

    // Build rows
    const rows = items.map(item => {
      const imgCell = item.swatch
        ? `<td><div class="item-swatch" style="background:${item.color}; border:1px solid ${item.border};"></div></td>`
        : `<td><img class="item-img" src="${CATALOG_BASE}/${key}/${item.file}" alt="${item.name}" loading="lazy"></td>`;

      const subText = item.subsub ? `${item.sub} › ${item.subsub}` : item.sub;
      const extraCells = extraCols.map(c => `<td>${attr(item[c])}</td>`).join('');
      const descCell = item.description
        ? `<td class="desc">${item.description}</td>`
        : `<td class="desc empty">Not filled in yet</td>`;

      return `
        <tr>
          ${imgCell}
          <td><div class="item-name">${item.name}</div><div class="item-sub">${subText}</div></td>
          <td>${formalityAttr(item.formality)}</td>
          <td>${attr(item.color)}</td>
          <td>${familyAttr(item.colorFamily)}</td>
          <td>${toneAttr(item.tone)}</td>
          <td>${attr(item.season)}</td>
          ${extraCells}
          ${descCell}
        </tr>`;
    }).join('');

    content.innerHTML += `
      <div class="cat-group collapsed">
        <div class="cat-header" onclick="toggle(this)">
          <span>${meta.icon}</span>
          <span class="cat-header-title">${meta.label}</span>
          <span class="cat-header-count">${items.length} items</span>
          <span class="cat-header-arrow">▼</span>
        </div>
        <div class="cat-table-wrap">
          <table>
            <thead>
              <tr>
                <th>Image</th>
                <th>Name</th>
                <th>Formality</th>
                <th>Color</th>
                <th>Family</th>
                <th>Tone</th>
                <th>Season</th>
                ${extraHeaders}
                <th>Description</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>`;
  });
}

buildPage();
</script>
</body>
</html>
