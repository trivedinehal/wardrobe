<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catalog View</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f2f2f7;
    color: #1c1c1e;
  }

  /* Header */
  .header {
    background: #fff;
    padding: 16px 24px;
    border-bottom: 1px solid #e5e5ea;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header h1 { font-size: 20px; font-weight: 700; margin-bottom: 2px; }
  .header p { font-size: 12px; color: #8e8e93; }

  /* Content */
  .content { padding: 20px 24px; }

  /* Category group */
  .cat-group { margin-bottom: 16px; }

  .cat-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    background: #1c1c1e;
    color: #fff;
    border-radius: 12px 12px 0 0;
    cursor: pointer;
    user-select: none;
  }
  .cat-group.collapsed .cat-header {
    border-radius: 12px;
  }
  .cat-header-title { font-size: 14px; font-weight: 700; flex: 1; }
  .cat-header-count { font-size: 12px; color: #8e8e93; }
  .cat-header-arrow { font-size: 12px; transition: transform 0.2s; }
  .cat-group.collapsed .cat-header-arrow { transform: rotate(-90deg); }

  /* Table */
  .cat-table {
    background: #fff;
    border-radius: 0 0 12px 12px;
    overflow: hidden;
    border: 1px solid #e5e5ea;
    border-top: none;
  }
  .cat-group.collapsed .cat-table { display: none; }

  /* Column headers */
  .table-head {
    display: grid;
    grid-template-columns: 80px 1fr 120px 100px 100px;
    padding: 8px 12px;
    background: #f8f8f8;
    border-bottom: 1px solid #e5e5ea;
  }
  .table-head span {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: #8e8e93;
  }

  /* Item row */
  .item-row {
    display: grid;
    grid-template-columns: 80px 1fr 120px 100px 100px;
    align-items: center;
    padding: 10px 12px;
    border-bottom: 1px solid #f2f2f7;
    gap: 8px;
  }
  .item-row:last-child { border-bottom: none; }
  .item-row:hover { background: #fafafa; }

  .item-img {
    width: 70px;
    height: 70px;
    object-fit: contain;
    border-radius: 8px;
    background: #f2f2f7;
  }

  .item-swatch {
    width: 70px;
    height: 40px;
    border-radius: 8px;
    border: 1px solid #e5e5ea;
  }

  .item-name {
    font-size: 13px;
    font-weight: 500;
    color: #1c1c1e;
    line-height: 1.3;
  }

  .item-sub, .item-subsub {
    font-size: 12px;
    color: #3a3a3c;
  }

  .style-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .style-tag {
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 500;
    white-space: nowrap;
  }
  .style-tag.formal     { background: #1c1c1e; color: #fff; }
  .style-tag.smart      { background: #3a6ea5; color: #fff; }
  .style-tag.casual     { background: #34c759; color: #1c1c1e; }
  .style-tag.none       { background: #f2f2f7; color: #8e8e93; }

  .dash { color: #c7c7cc; font-size: 12px; }
</style>
</head>
<body>

<div class="header">
  <h1>Catalog View</h1>
  <p>Review and verify item classification — category, sub and sub-sub</p>
</div>

<div class="content" id="content"></div>

<script src="catalog.js"></script>
<script>
const CATALOG_BASE = "catalog";

// catalog, CAT_ORDER, CAT_META, SUB_CATS, SUBSUB_CATS all loaded from catalog.js

function buildPage() {
  const content = document.getElementById('content');

  for (const key of CAT_ORDER) {
    const items = catalog[key];
    const meta = CAT_META[key];
    if (!meta) continue;
    const cat = { label: meta.label, icon: meta.icon, items: items || [] };
    const group = document.createElement('div');
    group.className = 'cat-group';
    group.innerHTML = `
      <div class="cat-header" onclick="toggle(this)">
        <span>${cat.icon}</span>
        <span class="cat-header-title">${cat.label}</span>
        <span class="cat-header-count">${cat.items.length} items</span>
        <span class="cat-header-arrow">▼</span>
      </div>
      <div class="cat-table">
        <div class="table-head">
          <span>Image</span>
          <span>Name</span>
          <span>Brand</span>
          <span>Sub</span>
          <span>Sub-Sub</span>
        </div>
        <div class="table-body" id="body-${key}"></div>
      </div>
    `;
    content.appendChild(group);

    const body = group.querySelector(`#body-${key}`);
    cat.items.forEach(item => {
      const row = document.createElement('div');
      row.className = 'item-row';

      // Image or swatch
      let imgHTML;
      if (item.swatch) {
        imgHTML = `<div class="item-swatch" style="background:${item.color}; border: 1px solid ${item.border};"></div>`;
      } else {
        imgHTML = `<img class="item-img" src="${CATALOG_BASE}/${key}/${item.file}" alt="${item.name}" loading="lazy">`;
      }

      row.innerHTML = `
        ${imgHTML}
        <div class="item-name">${item.name}</div>
        <div class="item-sub">${item.brand || '—'}</div>
        <div class="item-sub">${item.sub}</div>
        <div class="item-subsub">${item.subsub || '—'}</div>
      `;
      body.appendChild(row);
    });
  }
}

function toggle(header) {
  const group = header.parentElement;
  group.classList.toggle('collapsed');
}

buildPage();
</script>
</body>
</html>
