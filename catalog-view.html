<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catalog View</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f2f2f7;
    color: #1c1c1e;
  }

  /* Header */
  .header {
    background: #fff;
    padding: 16px 24px;
    border-bottom: 1px solid #e5e5ea;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .home-btn { font-size: 14px; color: #007aff; text-decoration: none; display: inline-block; margin-bottom: 4px; }
  .header h1 { font-size: 20px; font-weight: 700; margin-bottom: 2px; }
  .header p { font-size: 12px; color: #8e8e93; }

  /* Content */
  .content { padding: 20px 24px; }

  /* Category group */
  .cat-group { margin-bottom: 16px; }

  .cat-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    background: #1c1c1e;
    color: #fff;
    border-radius: 12px 12px 0 0;
    cursor: pointer;
    user-select: none;
  }
  .cat-group.collapsed .cat-header { border-radius: 12px; }
  .cat-header-title { font-size: 14px; font-weight: 700; flex: 1; }
  .cat-header-count { font-size: 12px; color: #8e8e93; }
  .cat-header-arrow { font-size: 12px; transition: transform 0.2s; }
  .cat-group.collapsed .cat-header-arrow { transform: rotate(-90deg); }

  /* Table */
  .cat-table {
    background: #fff;
    border-radius: 0 0 12px 12px;
    overflow-x: auto;
    border: 1px solid #e5e5ea;
    border-top: none;
  }
  .cat-group.collapsed .cat-table { display: none; }
  .cat-table-inner { min-width: 500px; }

  .table-head {
    display: grid;
    grid-template-columns: 80px 1fr 120px 100px 100px;
    padding: 8px 12px;
    background: #f8f8f8;
    border-bottom: 1px solid #e5e5ea;
  }
  .table-head span {
    font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.6px; color: #8e8e93;
  }

  .item-row {
    display: grid;
    grid-template-columns: 80px 1fr 120px 100px 100px;
    align-items: center;
    padding: 10px 12px;
    border-bottom: 1px solid #f2f2f7;
    gap: 8px;
    cursor: pointer;
  }
  .item-row:last-child { border-bottom: none; }
  .item-row:hover { background: #fafafa; }
  .item-row:active { background: #f0f0f5; }

  .item-img {
    width: 70px; height: 70px;
    object-fit: contain; border-radius: 8px; background: #f2f2f7;
  }
  .item-swatch {
    width: 70px; height: 40px;
    border-radius: 8px; border: 1px solid #e5e5ea;
  }
  .item-name { font-size: 13px; font-weight: 500; color: #1c1c1e; line-height: 1.3; }
  .item-sub, .item-subsub { font-size: 12px; color: #3a3a3c; }
  .dash { color: #c7c7cc; font-size: 12px; }
  .missing { color: #ff3b30; font-size: 12px; font-style: italic; }

  /* ── Detail overlay ─────────────────────────────────────── */
  #detail-overlay {
    display: none;
    position: fixed; inset: 0;
    background: #f2f2f7;
    z-index: 200;
    flex-direction: column;
    overflow: hidden;
  }
  #detail-overlay.open { display: flex; }

  .detail-header {
    background: #fff;
    border-bottom: 1px solid #e5e5ea;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .detail-back {
    font-size: 14px; color: #007aff; cursor: pointer;
    background: none; border: none; padding: 0; flex-shrink: 0;
  }
  .detail-header-title { font-size: 15px; font-weight: 600; flex: 1; }
  .detail-nav { display: flex; gap: 8px; flex-shrink: 0; }
  .detail-nav button {
    background: #f2f2f7; border: none; border-radius: 8px;
    width: 32px; height: 32px; font-size: 16px; cursor: pointer; color: #007aff;
  }
  .detail-nav button:disabled { color: #c7c7cc; cursor: default; }
  .detail-counter { font-size: 12px; color: #8e8e93; align-self: center; }

  .detail-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .detail-image-wrap {
    background: #fff;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    min-height: 240px;
  }
  .detail-image-wrap img {
    max-width: 100%; max-height: 280px;
    object-fit: contain;
  }
  .detail-swatch {
    width: 100%; height: 120px;
    border-radius: 12px;
    border: 1px solid #e5e5ea;
  }

  .detail-card {
    background: #fff;
    border-radius: 16px;
    overflow: hidden;
  }
  .detail-row {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid #f2f2f7;
    gap: 12px;
  }
  .detail-row:last-child { border-bottom: none; }
  .detail-label {
    font-size: 12px; color: #8e8e93; min-width: 90px; flex-shrink: 0;
  }
  .detail-value { font-size: 13px; color: #1c1c1e; font-weight: 500; }
  .detail-value.missing { color: #ff3b30; font-style: italic; font-weight: 400; }

  .tag {
    display: inline-block; font-size: 11px; font-weight: 600;
    padding: 3px 9px; border-radius: 20px; margin: 2px 2px 2px 0;
    background: #f2f2f7; color: #3a3a3c;
  }
</style>
</head>
<body>

<div class="header">
  <a class="home-btn" href="wardrobe.html">‹ Home</a>
  <h1>Catalog View</h1>
  <p>Tap any item to see details</p>
</div>

<div class="content" id="content"></div>

<!-- Detail overlay -->
<div id="detail-overlay">
  <div class="detail-header">
    <button class="detail-back" onclick="closeDetail()">‹ Back</button>
    <div class="detail-header-title" id="detail-title"></div>
    <div class="detail-counter" id="detail-counter"></div>
    <div class="detail-nav">
      <button id="btn-prev" onclick="navDetail(-1)">‹</button>
      <button id="btn-next" onclick="navDetail(1)">›</button>
    </div>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

<script src="catalog.js"></script>
<script>
const CATALOG_BASE = "catalog";

// Flat list of all items for detail navigation, built per category
let detailItems = [];   // [{ item, cat }]
let detailIndex = 0;

function buildPage() {
  const content = document.getElementById('content');

  for (const key of CAT_ORDER) {
    const items = catalog[key];
    const meta = CAT_META[key];
    if (!meta) continue;

    const group = document.createElement('div');
    group.className = 'cat-group collapsed';
    group.innerHTML = `
      <div class="cat-header" onclick="toggle(this)">
        <span>${meta.icon}</span>
        <span class="cat-header-title">${meta.label}</span>
        <span class="cat-header-count">${(items||[]).length} items</span>
        <span class="cat-header-arrow">▼</span>
      </div>
      <div class="cat-table">
        <div class="cat-table-inner">
          <div class="table-head">
            <span>Image</span><span>Name</span><span>Brand</span><span>Sub</span><span>Sub-Sub</span>
          </div>
          <div class="table-body" id="body-${key}"></div>
        </div>
      </div>
    `;
    content.appendChild(group);

    const body = group.querySelector(`#body-${key}`);
    (items || []).forEach((item, i) => {
      const globalIdx = detailItems.length;
      detailItems.push({ item, cat: key });

      const row = document.createElement('div');
      row.className = 'item-row';
      row.onclick = () => openDetail(globalIdx);

      let imgHTML;
      if (item.swatch) {
        imgHTML = `<div class="item-swatch" style="background:${item.color}; border:1px solid ${item.border || '#e5e5ea'};"></div>`;
      } else {
        imgHTML = `<img class="item-img" src="${CATALOG_BASE}/${key}/${item.file}" alt="${item.name}" loading="lazy">`;
      }

      const brand = item.brand
        ? `<div class="item-sub">${item.brand}</div>`
        : `<div class="missing">missing</div>`;

      row.innerHTML = `
        ${imgHTML}
        <div class="item-name">${item.name}</div>
        ${brand}
        <div class="item-sub">${item.sub || '—'}</div>
        <div class="item-subsub">${item.subsub || '—'}</div>
      `;
      body.appendChild(row);
    });
  }
}

function toggle(header) {
  header.parentElement.classList.toggle('collapsed');
}

function openDetail(idx) {
  detailIndex = idx;
  renderDetail();
  document.getElementById('detail-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDetail() {
  document.getElementById('detail-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function navDetail(dir) {
  const newIdx = detailIndex + dir;
  if (newIdx < 0 || newIdx >= detailItems.length) return;
  detailIndex = newIdx;
  renderDetail();
}

function renderDetail() {
  const { item, cat } = detailItems[detailIndex];
  const meta = CAT_META[cat];

  document.getElementById('detail-title').textContent = item.name;
  document.getElementById('detail-counter').textContent = `${detailIndex + 1} / ${detailItems.length}`;
  document.getElementById('btn-prev').disabled = detailIndex === 0;
  document.getElementById('btn-next').disabled = detailIndex === detailItems.length - 1;

  // Image / swatch
  let imageHTML;
  if (item.swatch) {
    imageHTML = `<div class="detail-swatch" style="background:${item.color}; border:1px solid ${item.border || '#e5e5ea'};"></div>`;
  } else {
    imageHTML = `<img src="${CATALOG_BASE}/${cat}/${item.file}" alt="${item.name}">`;
  }

  // Core fields
  function row(label, value, isMissing) {
    const cls = (!value || isMissing) ? 'detail-value missing' : 'detail-value';
    const display = value || 'missing';
    return `<div class="detail-row"><div class="detail-label">${label}</div><div class="${cls}">${display}</div></div>`;
  }

  const catPath = [meta.label, item.sub, item.subsub].filter(Boolean).join(' › ');

  const body = document.getElementById('detail-body');
  body.innerHTML = `
    <div class="detail-image-wrap">${imageHTML}</div>
    <div class="detail-card">
      ${row('Category', catPath)}
      ${row('Brand', item.brand, !item.brand)}
      ${row('Colour', item.color)}
      ${row('Tone', item.tone)}
      ${row('Season', item.season)}
    </div>
  `;

  // Scroll to top on navigation
  body.scrollTop = 0;
}

buildPage();

// Swipe support on detail overlay
let touchStartX = 0;
document.getElementById('detail-overlay').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
}, { passive: true });
document.getElementById('detail-overlay').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) navDetail(dx < 0 ? 1 : -1);
}, { passive: true });
</script>
</body>
</html>
