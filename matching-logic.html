<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Matching Logic</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f2f2f7;
  color: #1c1c1e;
  padding-bottom: 60px;
}
header {
  background: #1c1c1e; color: white;
  padding: 14px 20px; position: sticky; top: 0; z-index: 10;
  display: flex; align-items: center; gap: 14px;
}
header a { color: #888; text-decoration: none; font-size: 14px; }
header h1 { font-size: 17px; font-weight: 600; }
header p  { font-size: 12px; color: #888; margin-top: 2px; }

.page { max-width: 860px; margin: 0 auto; padding: 24px 16px 0; }

.section {
  background: white; border-radius: 16px; padding: 20px;
  margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.07);
}
.section-title {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.7px; color: #8e8e93; margin-bottom: 16px;
}

.tag { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; margin: 3px 3px 3px 0; }
.tag-blue   { background: #e8f0fe; color: #007aff; }
.tag-red    { background: #ffeaea; color: #d00; }
.tag-green  { background: #e6f9ed; color: #1a9e3a; }
.tag-grey   { background: #f2f2f7; color: #636366; }

.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 520px) { .two-col { grid-template-columns: 1fr; } }

.stat-card { background: #f7f7f9; border-radius: 12px; padding: 14px 16px; }
.stat-label { font-size: 11px; color: #8e8e93; margin-bottom: 4px; }
.stat-value { font-size: 22px; font-weight: 700; color: #1c1c1e; }
.stat-sub   { font-size: 11px; color: #8e8e93; margin-top: 2px; }

.excl-group { margin-bottom: 14px; }
.excl-group:last-child { margin-bottom: 0; }
.excl-pair-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #8e8e93; margin-bottom: 6px; }
.excl-item { display: flex; align-items: flex-start; gap: 10px; background: #ffeaea; border-radius: 10px; padding: 10px 12px; margin-bottom: 6px; }
.excl-item:last-child { margin-bottom: 0; }
.excl-x { font-size: 14px; font-weight: 800; color: #d00; flex-shrink: 0; line-height: 1.4; }
.excl-reason { font-size: 12px; color: #444; line-height: 1.45; }

.ctx-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.ctx-table th {
  background: #f2f2f7; text-align: left; padding: 7px 8px;
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.5px; color: #8e8e93; white-space: nowrap;
}
.ctx-table th:first-child { border-radius: 8px 0 0 0; }
.ctx-table th:last-child  { border-radius: 0 8px 0 0; }
.ctx-table td { padding: 7px 8px; border-bottom: 1px solid #f2f2f7; color: #1c1c1e; }
.ctx-table tr:last-child td { border-bottom: none; }
.ctx-table td:not(:first-child) { text-align: center; }
.ctx-table th:not(:first-child) { text-align: center; }
.pts-5  { color: #1a9e3a; font-weight: 800; }
.pts-4  { color: #34c759; font-weight: 700; }
.pts-3  { color: #e07000; font-weight: 600; }
.pts-2  { color: #8e8e93; }
.pts-1  { color: #c7c7cc; }
.pts-x  { color: #d00; font-weight: 700; }

.score-bar-wrap { position: relative; height: 36px; border-radius: 10px; overflow: hidden; display: flex; margin-bottom: 10px; }
.score-zone { display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: white; }
.score-labels { display: flex; font-size: 11px; color: #8e8e93; justify-content: space-between; padding: 0 2px; }

.divider { border: none; border-top: 1px solid #f0f0f0; margin: 14px 0; }
.note { font-size: 12px; color: #8e8e93; line-height: 1.5; margin-top: 10px; }

.ctx-block { margin-bottom: 20px; }
.ctx-block:last-child { margin-bottom: 0; }
.ctx-block-title { font-size: 12px; font-weight: 700; color: #1c1c1e; margin-bottom: 8px; }
</style>
</head>
<body>

<header>
  <a href="wardrobe.html">‹ Home</a>
  <div>
    <h1>Matching Logic</h1>
    <p>How the scoring engine rates outfits — v2</p>
  </div>
</header>

<div class="page" id="page"></div>

<script src="matching.js?v=4"></script>
<script>
const cfg = window.MATCH_CONFIG;
const page = document.getElementById('page');

function section(title, html) {
  return `<div class="section"><div class="section-title">${title}</div>${html}</div>`;
}

function ptsCell(v) {
  if (v === null || v === undefined) return `<td class="pts-x">✕</td>`;
  const cls = v >= 5 ? 'pts-5' : v >= 4 ? 'pts-4' : v >= 3 ? 'pts-3' : v >= 2 ? 'pts-2' : 'pts-1';
  return `<td class="${cls}">${v}</td>`;
}

// ── 1. How it works ──────────────────────────────────────────────────────────
function buildOverview() {
  return section('How It Works', `
    <p style="font-size:13px;line-height:1.6;color:#444;">
      Every item in the carousel is scored on two signals — then those signals are combined.
    </p>
    <hr class="divider">
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:4px;">
      <div class="stat-card">
        <div class="stat-label">Signal 1 — Context Fit &nbsp;<span class="tag tag-blue">0–5 pts</span></div>
        <div style="font-size:12px;color:#444;margin-top:6px;line-height:1.5;">
          How well does this item belong in the selected <strong>Style + Outfit Type</strong>?
          A casual shirt in a Formal/Suit context scores low. The same shirt in Smart Casual/Blazer+Jeans scores 5.
          This signal fires as soon as a style and outfit type are selected — even before anything is on the canvas.
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Signal 2 — Visual Harmony &nbsp;<span class="tag tag-green">0–5 pts</span></div>
        <div style="font-size:12px;color:#444;margin-top:6px;line-height:1.5;">
          How well does this item work visually with what is already on the canvas?
          Scores tone contrast (difference is good), colour harmony (neutrals are universally safe),
          and pattern pairing (one pattern + one solid reads well).
        </div>
      </div>
    </div>
    <hr class="divider">
    <p class="note" style="margin-top:0;">
      <strong>Combined:</strong> Context Fit + avg Harmony = final score (0–10).<br>
      If only one signal is available (context set but canvas empty, or canvas has items but no context), that signal is doubled to stay on the 0–10 scale.
    </p>
  `);
}

// ── 2. Star thresholds ───────────────────────────────────────────────────────
function buildThresholds() {
  const t = cfg.thresholds;
  const zones = [
    { label: '✕',    from: 0,      color: '#ff3b30', flex: t.one },
    { label: '⭐',    from: t.one,  color: '#d4a800', flex: t.two - t.one },
    { label: '⭐⭐',   from: t.two,  color: '#f5a623', flex: t.three - t.two },
    { label: '⭐⭐⭐',  from: t.three,color: '#34c759', flex: 2 },
  ];
  const bars = zones.map(z => `<div class="score-zone" style="flex:${z.flex};background:${z.color};">${z.label}</div>`).join('');
  const labels = zones.map(z => `<span>${z.from}+</span>`).join('');
  return section('Star Thresholds', `
    <div class="score-bar-wrap">${bars}</div>
    <div class="score-labels">${labels}<span>→ 10</span></div>
    <hr class="divider">
    <div class="two-col" style="margin-top:4px;">
      <div class="stat-card"><div class="stat-label">⭐⭐⭐ Three stars</div><div class="stat-value">${t.three}+</div><div class="stat-sub">Excellent fit for this context</div></div>
      <div class="stat-card"><div class="stat-label">⭐⭐ Two stars</div><div class="stat-value">${t.two}–${t.three-1}</div><div class="stat-sub">Good pairing</div></div>
      <div class="stat-card"><div class="stat-label">⭐ One star</div><div class="stat-value">${t.one}–${t.two-1}</div><div class="stat-sub">Acceptable</div></div>
      <div class="stat-card"><div class="stat-label">No stars / ✕</div><div class="stat-value">0–${t.one-1} / excl</div><div class="stat-sub">Poor fit or excluded</div></div>
    </div>
  `);
}

// ── 3. Context fit — Tops ─────────────────────────────────────────────────────
function buildContextTops() {
  const table = cfg.contextFit.tops;
  const types = ['dress-shirt', 'casual-shirt', 't-shirt'];
  const labels = { 'dress-shirt': 'Dress Shirt', 'casual-shirt': 'Casual Shirt', 't-shirt': 'T-Shirt' };
  const headers = types.map(t => `<th>${labels[t]}</th>`).join('');
  const rows = Object.entries(table).map(([ctx, scores]) => {
    const cells = types.map(t => ptsCell(scores[t])).join('');
    return `<tr><td style="font-size:11px;">${ctx}</td>${cells}</tr>`;
  }).join('');
  return `
    <div class="ctx-block">
      <div class="ctx-block-title">Tops</div>
      <div style="overflow-x:auto;">
        <table class="ctx-table">
          <thead><tr><th>Context</th>${headers}</tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <p class="note">Dress shirt = has Formal or Semi-Formal in formality. Casual shirt = Shirts sub without Formal. T-shirt = T-Shirts sub.</p>
    </div>`;
}

// ── 3. Context fit — Pants ────────────────────────────────────────────────────
function buildContextPants() {
  const table = cfg.contextFit.pants;
  const types = ['dress-trousers', 'chinos', 'smart-denim', 'casual-denim', 'relaxed'];
  const labels = { 'dress-trousers': 'Dress Trousers', chinos: 'Chinos', 'smart-denim': 'Smart Denim', 'casual-denim': 'Casual Denim', relaxed: 'Relaxed' };
  const headers = types.map(t => `<th>${labels[t]}</th>`).join('');
  const rows = Object.entries(table).map(([ctx, scores]) => {
    const cells = types.map(t => ptsCell(scores[t])).join('');
    return `<tr><td style="font-size:11px;">${ctx}</td>${cells}</tr>`;
  }).join('');
  return `
    <div class="ctx-block">
      <div class="ctx-block-title">Pants &nbsp;<span class="tag tag-grey" style="font-size:10px;">Pants hidden in Suit mode</span></div>
      <div style="overflow-x:auto;">
        <table class="ctx-table">
          <thead><tr><th>Context</th>${headers}</tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <p class="note">Smart denim = dark/smart wash jeans with Smart Casual in formality. Relaxed = linen or utility.</p>
    </div>`;
}

// ── 3. Context fit — Shoes ────────────────────────────────────────────────────
function buildContextShoes() {
  const table = cfg.contextFit.shoes;
  const types = ['dress-shoe', 'chelsea-boot', 'loafer', 'sneaker', 'athletic'];
  const labels = { 'dress-shoe': 'Dress Shoe', 'chelsea-boot': 'Chelsea Boot', loafer: 'Loafer', sneaker: 'Sneaker', athletic: 'Athletic' };
  const headers = types.map(t => `<th>${labels[t]}</th>`).join('');
  const rows = Object.entries(table).map(([ctx, scores]) => {
    const cells = types.map(t => ptsCell(scores[t])).join('');
    return `<tr><td style="font-size:11px;">${ctx}</td>${cells}</tr>`;
  }).join('');
  return `
    <div class="ctx-block">
      <div class="ctx-block-title">Shoes</div>
      <div style="overflow-x:auto;">
        <table class="ctx-table">
          <thead><tr><th>Context</th>${headers}</tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

// ── 3. Context fit — Outer ────────────────────────────────────────────────────
function buildContextOuter() {
  const table = cfg.contextFit.outer;
  const types = ['suit-wool', 'suit-linen', 'formal-blazer', 'casual-blazer'];
  const labels = { 'suit-wool': 'Wool Suit', 'suit-linen': 'Linen Suit', 'formal-blazer': 'Formal Blazer', 'casual-blazer': 'Casual Blazer' };
  const headers = types.map(t => `<th>${labels[t]}</th>`).join('');
  const rows = Object.entries(table).map(([ctx, scores]) => {
    const cells = types.map(t => ptsCell(scores[t])).join('');
    return `<tr><td style="font-size:11px;">${ctx}</td>${cells}</tr>`;
  }).join('');
  return `
    <div class="ctx-block">
      <div class="ctx-block-title">Outer &nbsp;<span class="tag tag-grey" style="font-size:10px;">No-outer contexts not listed — outer scores null (not excluded)</span></div>
      <div style="overflow-x:auto;">
        <table class="ctx-table">
          <thead><tr><th>Context</th>${headers}</tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

function buildContextFit() {
  return section(`Context Fit — Style + Outfit Type → Item Score`, `
    <p style="font-size:12px;color:#444;line-height:1.5;margin-bottom:16px;">
      The primary scoring signal. Each item is scored 0–5 based on how well it fits the selected Style + Outfit Type combination.
      ✕ means excluded — that item type does not belong in this context.
    </p>
    ${buildContextTops()}
    <hr class="divider">
    ${buildContextPants()}
    <hr class="divider">
    ${buildContextShoes()}
    <hr class="divider">
    ${buildContextOuter()}
  `);
}

// ── 4. Visual Harmony ─────────────────────────────────────────────────────────
function buildHarmony() {
  return section('Visual Harmony — Item vs Canvas', `
    <p style="font-size:12px;color:#444;line-height:1.5;margin-bottom:14px;">
      Scored against each relevant item already on canvas, then averaged. Three components add up to a max of 5 pts.
    </p>
    <div style="display:flex;flex-direction:column;gap:10px;">
      <div class="stat-card">
        <div class="stat-label">Tone Contrast &nbsp;<span class="tag tag-blue">0–2 pts</span></div>
        <div style="font-size:12px;color:#444;margin-top:6px;line-height:1.5;">
          2-step difference (light + dark) → 2 pts. 1-step → 1 pt. Same tone → 0 pts.<br>
          Contrast is a menswear principle — avoid head-to-toe same tone.
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Colour Harmony &nbsp;<span class="tag tag-green">0–2 pts</span></div>
        <div style="font-size:12px;color:#444;margin-top:6px;line-height:1.5;">
          Either item is neutral (black, white, grey, navy) → 2 pts. Same non-neutral family or contrasting families → 1 pt each.
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pattern Pairing &nbsp;<span class="tag tag-grey">0–1 pt</span></div>
        <div style="font-size:12px;color:#444;margin-top:6px;line-height:1.5;">
          One patterned item + one solid → +1 pt. Both solid or both patterned → 0 (pattern-on-pattern is a hard exclusion).
        </div>
      </div>
    </div>
    <hr class="divider">
    <p class="note" style="margin-top:0;">
      Harmony is scored vs the most relevant canvas items: top↔outer or top↔pants (no outer), pants↔outer+shoes, shoes↔pants+outer.
    </p>
  `);
}

// ── 5. Hard exclusions ────────────────────────────────────────────────────────
function buildExclusions() {
  const byPair = {};
  cfg.exclusions.forEach(e => {
    if (!byPair[e.pair]) byPair[e.pair] = [];
    byPair[e.pair].push(e);
  });
  const html = Object.entries(byPair).map(([pair, rules]) => `
    <div class="excl-group">
      <div class="excl-pair-label">${pair}</div>
      ${rules.map(r => `
        <div class="excl-item">
          <div class="excl-x">✕</div>
          <div class="excl-reason">${r.reason}</div>
        </div>`).join('')}
    </div>`).join('');
  return section(`Hard Exclusion Rules &nbsp;<span class="tag tag-red">${cfg.exclusions.length} rules</span>`, `
    <p class="note" style="margin-top:0;margin-bottom:14px;">Always excluded regardless of context — greyed out in carousel, never suggested by Complete Outfit.</p>
    ${html}
  `);
}

// ── 6. Belt rules ─────────────────────────────────────────────────────────────
function buildBeltRules() {
  const widths = ['thin', 'medium', 'wide'];
  const rows = Object.values(cfg.beltVsPants).map(ctx => {
    const cells = widths.map(w => {
      const v = ctx.scores[w];
      if (v === null) return `<td class="pts-x">✕</td>`;
      return `<td class="${v >= 3 ? 'pts-5' : v >= 2 ? 'pts-3' : 'pts-1'}">${v} pts</td>`;
    }).join('');
    return `<tr><td>${ctx.label}</td>${cells}</tr>`;
  }).join('');
  return section('Belt Scoring', `
    <p class="note" style="margin-top:0;margin-bottom:14px;">
      Belt scoring is pairwise — width vs pants loops, tone match vs shoes. Colour matching (black shoe → black belt etc) is a hard exclusion above.
    </p>
    <div style="overflow-x:auto;">
      <table class="ctx-table">
        <thead><tr><th>Loop type</th><th>Thin belt</th><th>Medium belt</th><th>Wide belt</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <p class="note" style="margin-top:12px;">Elastic waist pants (no loop) always ✕ with any belt.</p>
  `);
}

// ── Render ────────────────────────────────────────────────────────────────────
page.innerHTML = [
  buildOverview(),
  buildThresholds(),
  buildContextFit(),
  buildHarmony(),
  buildExclusions(),
  buildBeltRules(),
].join('');
</script>
</body>
</html>
